<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#04050a" />
    <link rel="icon" href="/icons/mote-icon.svg" />
    <title>3DGS Transition Dust Study</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #04050a;
        color: #eef3f7;
        letter-spacing: 0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #04050a;
      }

      button,
      input {
        font: inherit;
        letter-spacing: 0;
      }

      #viewport,
      #viewport canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #viewport canvas {
        display: block;
        touch-action: none;
        cursor: grab;
      }

      #viewport canvas:active {
        cursor: grabbing;
      }

      .edge-atmosphere {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          ellipse at 50% 47%,
          transparent 48%,
          rgba(42, 106, 116, 0.025) 68%,
          rgba(34, 104, 116, 0.11) 100%
        );
        box-shadow: inset 0 0 150px rgba(74, 160, 170, 0.055);
        mix-blend-mode: screen;
        transition: opacity 900ms ease;
      }

      body[data-flow-state="LOADING"] .edge-atmosphere,
      body[data-flow-state="READY"] .edge-atmosphere {
        opacity: 1;
      }

      .loading-state {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: grid;
        place-items: center;
        color: #dce8ee;
        background: rgba(4, 5, 10, 0.72);
        font-size: 13px;
        font-weight: 560;
        pointer-events: none;
        transition: opacity 240ms ease;
      }

      .loading-state[hidden] {
        display: none;
      }

      .loading-mark {
        width: 8px;
        height: 8px;
        margin-left: 8px;
        display: inline-block;
        border-radius: 50%;
        background: #8fdfff;
        box-shadow: 0 0 18px rgba(143, 223, 255, 0.82);
        animation: loading-pulse 1.2s ease-in-out infinite;
      }

      @keyframes loading-pulse {
        0%, 100% { opacity: 0.28; transform: scale(0.72); }
        50% { opacity: 1; transform: scale(1); }
      }

      .action-ui {
        position: fixed;
        z-index: 4;
        left: 50%;
        bottom: max(15%, calc(24px + env(safe-area-inset-bottom)));
        width: min(520px, calc(100vw - 32px));
        transform: translateX(-50%);
        text-align: center;
        color: #fff;
        opacity: 1;
        transition: opacity 500ms ease, transform 500ms ease;
      }

      .action-ui[data-hidden="true"] {
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, 8px);
      }

      .action-button {
        min-width: min(330px, calc(100vw - 40px));
        min-height: 54px;
        padding: 14px 36px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(15px) saturate(1.08);
        -webkit-backdrop-filter: blur(15px) saturate(1.08);
        color: #fff;
        font-size: 15px;
        font-weight: 520;
        cursor: pointer;
        transition: color 400ms ease, border-color 400ms ease, background 400ms ease, box-shadow 400ms ease, transform 400ms ease;
      }

      .action-button:hover,
      .action-button:focus-visible {
        border-color: rgba(255, 255, 255, 0.58);
        background: rgba(255, 255, 255, 0.16);
        box-shadow: 0 5px 25px rgba(255, 255, 255, 0.18);
        outline: none;
        transform: translateY(-3px);
      }

      .action-button[data-ready="true"] {
        border-color: rgba(91, 255, 211, 0.78);
        color: #63ffd8;
        box-shadow: 0 0 30px rgba(45, 255, 201, 0.24);
      }

      .action-button[data-ready="true"]:hover,
      .action-button[data-ready="true"]:focus-visible {
        background: rgba(45, 255, 201, 0.13);
        box-shadow: 0 5px 38px rgba(45, 255, 201, 0.38);
      }

      .action-button:disabled {
        border-color: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.48);
        cursor: default;
        transform: none;
      }

      .action-subtitle {
        min-height: 16px;
        margin-top: 14px;
        color: rgba(255, 255, 255, 0.48);
        font-size: 11px;
        font-weight: 500;
        text-align: center;
        text-transform: uppercase;
        transition: color 400ms ease;
      }

      .audio-ui {
        position: fixed;
        z-index: 4;
        top: max(18px, env(safe-area-inset-top));
        left: 18px;
        display: flex;
        align-items: center;
        gap: 11px;
        color: rgba(225, 238, 240, 0.72);
      }

      .audio-toggle {
        width: 38px;
        height: 38px;
        flex: 0 0 38px;
        padding: 0;
        border: 1px solid rgba(181, 217, 222, 0.24);
        border-radius: 50%;
        background: rgba(7, 18, 22, 0.52);
        color: #cae9ec;
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .audio-toggle:hover,
      .audio-toggle:focus-visible {
        border-color: rgba(112, 213, 225, 0.62);
        background: rgba(25, 77, 84, 0.34);
        outline: none;
      }

      .audio-copy {
        min-width: 0;
      }

      .audio-title {
        color: rgba(235, 246, 247, 0.86);
        font-size: 11px;
        font-weight: 650;
      }

      .audio-credit {
        margin-left: 5px;
        color: rgba(206, 225, 228, 0.5);
        font-size: 10px;
        text-decoration: none;
      }

      .fft-meter {
        width: 108px;
        height: 8px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 3px;
        margin-top: 5px;
      }

      .fft-band {
        height: 2px;
        align-self: center;
        transform: scaleX(0.08);
        transform-origin: left center;
        background: rgba(105, 202, 215, 0.78);
        box-shadow: 0 0 8px rgba(82, 190, 205, 0.32);
        transition: transform 80ms linear;
      }

      .fft-band:nth-child(2) { background: rgba(151, 211, 214, 0.72); }
      .fft-band:nth-child(3) { background: rgba(190, 222, 220, 0.68); }
      .fft-band:nth-child(4) { background: rgba(128, 183, 191, 0.6); }

      .reveal-mode-ui {
        position: fixed;
        z-index: 4;
        top: max(18px, env(safe-area-inset-top));
        right: 18px;
        display: inline-grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: min(224px, calc(100vw - 184px));
        min-width: 156px;
        padding: 3px;
        border: 1px solid rgba(181, 217, 222, 0.2);
        border-radius: 999px;
        background: rgba(7, 18, 22, 0.46);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: opacity 240ms ease;
      }

      .reveal-mode-ui[data-locked="true"] {
        opacity: 0.42;
      }

      .reveal-mode-button {
        min-width: 0;
        height: 32px;
        padding: 0 12px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(219, 239, 242, 0.66);
        font-size: 12px;
        font-weight: 580;
        white-space: nowrap;
        cursor: pointer;
      }

      .reveal-mode-button[data-active="true"] {
        background: rgba(112, 213, 225, 0.18);
        color: #dffbff;
        box-shadow: inset 0 0 0 1px rgba(137, 228, 238, 0.22), 0 0 18px rgba(82, 190, 205, 0.14);
      }

      .reveal-mode-button:focus-visible {
        outline: 1px solid rgba(143, 223, 255, 0.72);
        outline-offset: 2px;
      }

      .reveal-mode-button:disabled {
        cursor: default;
      }

      @media (max-width: 560px) {
        .audio-ui {
          top: max(12px, env(safe-area-inset-top));
          left: 12px;
        }

        .audio-toggle {
          width: 36px;
          height: 36px;
          flex-basis: 36px;
        }

        .audio-copy {
          max-width: 112px;
          overflow: hidden;
        }

        .audio-credit {
          display: none;
        }

        .fft-meter {
          width: 96px;
        }

        .action-ui {
          bottom: max(12%, calc(20px + env(safe-area-inset-bottom)));
        }

        .action-button {
          min-height: 50px;
          padding: 12px 24px;
          font-size: 14px;
        }

        .reveal-mode-ui {
          top: max(12px, env(safe-area-inset-top));
          right: 12px;
          width: min(178px, calc(100vw - 168px));
          min-width: 142px;
        }

        .reveal-mode-button {
          height: 30px;
          padding: 0 8px;
          font-size: 11px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .loading-mark,
        .loading-state,
        .action-ui,
        .action-button {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="viewport" aria-label="3DGS transition dust demo"></main>
    <div class="edge-atmosphere" aria-hidden="true"></div>

    <div id="loading" class="loading-state" role="status">
      <span id="loading-label">Loading scenes</span><span class="loading-mark" aria-hidden="true"></span>
    </div>

    <section class="audio-ui" aria-label="Music controls">
      <button id="audio-toggle" class="audio-toggle" type="button" title="Play music" aria-label="Play music">&#9654;</button>
      <div class="audio-copy">
        <div>
          <span class="audio-title">Cipher</span>
          <a class="audio-credit" href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noreferrer">Kevin MacLeod · CC BY 4.0</a>
        </div>
        <div class="fft-meter" aria-hidden="true">
          <i class="fft-band" data-fft-band="low"></i>
          <i class="fft-band" data-fft-band="mid"></i>
          <i class="fft-band" data-fft-band="high"></i>
          <i class="fft-band" data-fft-band="energy"></i>
        </div>
      </div>
    </section>

    <section id="reveal-mode-ui" class="reveal-mode-ui" aria-label="Reveal mode">
      <button class="reveal-mode-button" type="button" data-reveal-mode="gather">回聚</button>
      <button class="reveal-mode-button" type="button" data-reveal-mode="center-bloom">中心展开</button>
    </section>

    <section id="action-ui" class="action-ui" data-demo-action aria-label="Transition controls">
      <button id="action-button" class="action-button" type="button" disabled>正在加载场景...</button>
      <div id="action-subtitle" class="action-subtitle" aria-live="polite">AWAITING SIGNAL</div>
    </section>

    <script type="module" src="/src/transition-dust-demo.ts"></script>
  </body>
</html>
